<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="design.css">
</head>
<body>

<div class="container">

    <h1>Expense Tracker</h1>

    <div class="top-section">

        <div class="card">
            <h3>Budget</h3>

            <input type="number" id="budgetInput" placeholder="Enter  Total Budget">

            <button onclick="setBudget()">Set Budget</button>
        </div>

        <div class="card">
            <h3>Expenses</h3>

            <input type="text" id="expenseTitle" placeholder="Enter Name of Product">

            <input type="number" id="expenseAmount" placeholder="Enter Cost of Product">

            <button onclick="addExpense()">Add Expense</button>
        </div>

    </div>

    <div class="summary">

        <div>
            <h3>Total Budget</h3>
            <p id="totalBudget">0</p>
        </div>

        <div>
            <h3>Total Expenses</h3>
            <p id="totalExpenses">0</p>
        </div>

        <div>
            <h3>Balance</h3>
            <p id="balance">0</p>
        </div>

    </div>

    <div class="expense-list">

        <h2>Expense List</h2>

        <ul id="expenseItems"></ul>

    </div>

</div>

<script src="app.js"></script>

</body>
</html>
